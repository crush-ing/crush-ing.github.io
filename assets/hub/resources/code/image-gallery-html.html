    <body>
        <main>

            <div class="container">

                <h1>Gallery</h1>

                <!--CATEGORIES ooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo-->

                <h2>Categories</h2>

                <div class="filter">

                    <div class="options">
                        <label><input type="radio" name="operation" value="union" id="op-union" checked>Inclusive</label>
                        <label><input type="radio" name="operation" value="intersection" id="op-inter">Exclusive</label>
                    </div>

                    <h3>Animal</h3>

                    <div class="categories">

                        <div class="filter__checkbox"><span class="category"><input type="checkbox" value="bird" id="cat-bird"><label for="cat-bird">bird</label></span></div>
                        <div class="filter__checkbox"><span class="category"><input type="checkbox" value="walrus" id="cat-walrus"><label for="cat-walrus">walrus</label></span></div>
                        <div class="filter__checkbox"><span class="category"><input type="checkbox" value="cow" id="cat-cow"><label for="cat-cow">cow</label></span></div>
                    </div>

                    <h3>Color</h3>

                    <div class="categories">

                        <div class="filter__checkbox"><span class="category"><input type="checkbox" value="black" id="cat-black"><label for="cat-black">black</label></span></div>
                        <div class="filter__checkbox"><span class="category"><input type="checkbox" value="white" id="cat-white"><label for="cat-white">white</label></span></div>
                    </div>

                </div><br>

        </main>

        <script>

            // CHECKBOX SELECTION

            var checkboxes = document.querySelectorAll(".categories input");
            for(var i = 0; i < checkboxes.length; i++) {
                checkboxes[i].addEventListener("change", filter);
            }
            var radios = document.getElementsByName("operation");
            for(var i = 0; i < radios.length; i++) {
                radios[i].addEventListener("change", filter);
            }
            filter();
            function filter() {
                var i, j;

                // Choose an operation
                var operation = document.getElementById("op-union").checked ? "union" : "intersection";

                // Get the selected categories
                var checkboxes = document.querySelectorAll(".categories input");
                var categories = [];
                var c;
                for(i = 0; i < checkboxes.length; i++) {
                if(checkboxes[i].checked) {
                    c = checkboxes[i].value;
                    categories.push(c);
                    }
                }

                // Apply the filter
                var items = document.querySelectorAll(".filterDiv");
                items.forEach(item=>item.style.display='block')
                var item, show;
                for(i = 0; i < items.length; i++) {
                item = items[i];
                if(categories.length == 0) {
                show = true;

                } else if(operation == "union") {
                // Union: Only one of the categories must apply

                show = false;
                for(j = 0; j < categories.length; j++) {
                if(item.classList.contains(categories[j])) {
                    show = true;
                    break;
                    }
                }
                if(!show) {
                    item.style.display="none";
                }
                } else {
                    //  console.log(operation)
                    // Intersection: All of the categories must apply
                    show = true;
                    for(j = 0; j < categories.length; j++) {
                        if(!item.classList.contains(categories[j])) {
                            item.style.display="none";
                            break;
                            }
                        }
                    }
                }
            }

        </script>
